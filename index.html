<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previsão do Tempo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🌤️ Clima Agora</h1>

        <div class="search-box">
            <input type="text" id="city-input" placeholder="Digite o nome da cidade...">
            <button id="search-btn">Buscar</button>
        </div>

        <div id="weather-data" class="hidden">
            <h2 id="city-name">Cidade</h2>
            <p id="temperature">-- °C</p>
            <p id="description">--</p>
            <div class="details">
                <p>💧 Umidade: <span id="humidity">--</span>%</p>
                <p>💨 Vento: <span id="wind">--</span> km/h</p>
            </div>
        </div>

        <p id="error-message" class="hidden error">Cidade não encontrada. Tente novamente.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
