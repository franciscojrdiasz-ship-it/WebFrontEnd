<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financeiro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <header>
            <h1>📈 Dashboard de Receitas</h1>
        </header>

        <div class="filters">
            <div class="filter-group">
                <label for="regiao">Região:</label>
                <select id="regiao">
                    <option value="Todas">Todas</option>
                    <option value="Norte">Norte</option>
                    <option value="Sul">Sul</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="produto">Serviço/Produto:</label>
                <select id="produto">
                    <option value="Todos">Todos</option>
                    <option value="Servidor Local">Servidor Local</option>
                    <option value="Licença Antivírus">Licença Antivírus</option>
                    <option value="Consultoria Seg">Consultoria Seg</option>
                </select>
            </div>

            <button id="btn-filtrar">Atualizar Gráfico</button>
        </div>

        <div class="chart-wrapper">
            <canvas id="vendasChart"></canvas>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
